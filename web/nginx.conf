server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Chat backend. proxy_buffering must be off or SSE tokens arrive in
    # one lump instead of streaming.
    location /api/gateway/ {
        proxy_pass http://gateway:8080/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Ingestion / dashboards API.
    location /api/ingestion/ {
        proxy_pass http://ingestion-api:8080/;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
